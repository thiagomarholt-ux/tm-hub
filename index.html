<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TM Hub">
<meta name="theme-color" content="#1c1c1e">
<title>TM Hub — Thiago Marholt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --red:#c0282d; --red-h:#a82025; --red-glow:rgba(192,40,45,.25); --red-s:rgba(192,40,45,.08);
  --bg:#1c1c1e; --bg2:#1e1e22; --bg3:#252529; --bg4:#2e2e33; --bg5:#38383e;
  --surface:#252529; --surface2:#2c2c31;
  --text:rgba(255,255,255,.95); --text2:rgba(255,255,255,.60);
  --text3:rgba(255,255,255,.38); --text4:rgba(255,255,255,.16);
  --bdr:rgba(255,255,255,.05); --bdr2:rgba(255,255,255,.10); --bdr3:rgba(255,255,255,.18);
  --emerald:#10b981; --emerald-dim:rgba(16,185,129,.13);
  --s-green:#10b981; --s-green-bg:rgba(16,185,129,.12);
  --s-yellow:#f59e0b; --s-yellow-bg:rgba(245,158,11,.11);
  --s-blue:#3b82f6; --s-blue-bg:rgba(59,130,246,.11);
  --s-orange:#f97316; --s-orange-bg:rgba(249,115,22,.11);
  --s-purple:#a855f7; --s-purple-bg:rgba(168,85,247,.11);
  --s-gray:rgba(255,255,255,.35); --s-gray-bg:rgba(255,255,255,.06);
  --sidebar:240px; --topbar:52px; --mono:'JetBrains Mono',monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --radius:10px; --radius-sm:8px; --radius-lg:14px; --radius-xl:18px;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;color:var(--text);font-family:var(--sans);overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased;font-feature-settings:"cv11","ss01";font-variant-numeric:tabular-nums;background-image:url("https://i.ibb.co/hJN0HvGB/pexels-share-textures-3167406-11285435.jpg");background-size:cover;background-position:center;background-attachment:fixed;}body::before{content:"";position:fixed;inset:0;background:rgba(28,28,30,0.94);pointer-events:none;z-index:0;}#app{position:relative;z-index:1;}

/* ═══ LAYOUT ═══ */
#app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* ═══ SIDEBAR ═══ */
#sidebar{
  width:var(--sidebar);flex-shrink:0;background-image:url("https://i.ibb.co/yFKTTSnV/pexels-zhmkhv-3373282-5512651.jpg");background-size:cover;background-position:center center;border-right:1px solid var(--red);box-shadow:1px 0 8px var(--red-glow);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:width .25s ease;z-index:50;position:relative;
}
#sidebar::before{content:"";position:absolute;inset:0;background:rgba(13,13,16,0.92);pointer-events:none;z-index:0;backdrop-filter:blur(1px)}
#sidebar>*{position:relative;z-index:1;}
#sidebar.collapsed{width:52px}
#sidebar.collapsed .sidebar-label,#sidebar.collapsed .sidebar-section-title,#sidebar.collapsed .board-item span,#sidebar.collapsed #sidebar-footer-text{display:none}#sidebar.collapsed .logo-wrap svg text{display:none}#sidebar.collapsed .logo-wrap svg{height:36px}
#sidebar.collapsed .board-item{justify-content:center;padding:10px}

.sidebar-top{padding:14px 14px 10px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo-svg{flex-shrink:0;width:32px;height:32px}
.logo-text{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.02em;line-height:1.2}
.logo-sub{font-size:10px;color:var(--text3);font-weight:400;letter-spacing:.06em;text-transform:uppercase}
.collapse-btn{width:28px;height:28px;border:1px solid var(--bdr2);background:var(--bg3);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;color:var(--text3)}
.collapse-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

.sidebar-section-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:14px 14px 6px}
.boards-list{flex:1;overflow-y:auto;padding:0 8px}
.boards-list::-webkit-scrollbar{width:0}
.board-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);
  cursor:pointer;margin-bottom:2px;transition:background .2s var(--ease),color .2s var(--ease);color:var(--text2);user-select:none;border-left:2px solid transparent;
}
.board-item:hover{background:var(--bg3);color:var(--text)}
.board-item.active{background:rgba(192,40,45,.12);color:var(--red);border-left:2px solid var(--red)}
.board-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.board-item span{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.board-drag{cursor:grab;color:var(--text4);flex-shrink:0}

.new-board-btn{
  display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:var(--radius-sm);
  cursor:pointer;color:var(--text3);margin:4px 8px;border:1px dashed var(--bdr2);
  transition:all .15s;font-size:13px;
}
.new-board-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-s)}

.sidebar-footer{padding:12px 14px;border-top:1px solid var(--bdr);flex-shrink:0}
.notif-btn{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--text3);font-size:13px;padding:6px 0}
.notif-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.notif-dot{width:7px;height:7px;background:var(--red);border-radius:50%;margin-left:auto}

/* ═══ MAIN ═══ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ═══ TOPBAR ═══ */
#topbar{
  height:var(--topbar);background:rgba(30,30,34,.97);border-bottom:1px solid var(--bdr);backdrop-filter:blur(12px);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
}
.board-title-wrap{display:flex;align-items:center;gap:8px;min-width:0}
.board-title{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.breadcrumb{font-size:12px;color:var(--text3);cursor:pointer}
.breadcrumb:hover{color:var(--text2)}
.top-sep{color:var(--text4);font-size:12px}

.search-wrap{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:6px 10px;flex:1;max-width:280px}
.search-wrap svg{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
.search-wrap input::placeholder{color:var(--text3)}

.view-tabs{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--radius-sm);padding:3px}
.view-tab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.view-tab svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.view-tab.active{background:var(--surface2);color:var(--text)}
.view-tab:hover:not(.active){color:var(--text2)}

.top-actions{display:flex;gap:6px;margin-left:auto}
.icon-btn{width:32px;height:32px;border:1px solid var(--bdr);background:var(--bg3);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s;position:relative;flex-shrink:0}
.icon-btn:hover{border-color:var(--bdr2);color:var(--text)}
.icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.badge-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid var(--bg2)}

/* ═══ CONTENT AREA ═══ */
#content{flex:1;overflow:auto;padding:16px;position:relative;z-index:1;}
#content::-webkit-scrollbar{width:6px;height:6px}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}

/* ═══ DASHBOARD PANEL (Financeiro) ═══ */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:18px}
.dash-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:18px 20px;position:relative;transition:transform .2s var(--ease),border-color .2s var(--ease)}.dash-card:hover{transform:translateY(-2px);border-color:var(--bdr2)}
.dash-card.accent{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.06)}
.dash-card.green{border-color:rgba(16,185,129,.22);background:var(--emerald-dim)}
.dash-card .dc-label{font-size:10px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.dash-card .dc-val{font-family:var(--mono);font-size:24px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.dash-card .dc-val.red{color:var(--emerald)}.dash-card .dc-val.green{color:var(--emerald)}
.dash-card .dc-val.blue{color:var(--s-blue)}.dash-card .dc-val.yellow{color:var(--s-yellow)}
.dash-card .dc-sub{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5}
.dash-card .dc-corner{position:absolute;top:12px;right:14px;font-size:10px;color:var(--text3);font-family:var(--mono)}
.prog-track{height:4px;background:rgba(255,255,255,.07);border-radius:9999px;overflow:hidden;margin-top:12px}
.prog-fill{height:100%;border-radius:9999px;transition:width .5s var(--ease)}

/* ═══ TABLE VIEW ═══ */
.board-table-wrap{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.group-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none}
.group-chevron{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;transition:transform .2s}
.group-chevron.open{transform:rotate(90deg)}
.group-name{font-size:13px;font-weight:600;color:var(--text)}
.group-count{font-size:11px;color:var(--text3);font-family:var(--mono)}
.group-add-btn{margin-left:auto;font-size:11px;color:var(--text3);cursor:pointer;padding:3px 8px;border-radius:5px;transition:all .15s}
.group-add-btn:hover{background:var(--bg5);color:var(--text)}

.table-head{display:flex;align-items:center;background:var(--bg3);border-bottom:1px solid var(--bdr);min-width:max-content}
.th{padding:8px 12px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);white-space:nowrap;border-right:1px solid var(--bdr);flex-shrink:0}
.th:first-child{min-width:240px;flex:1}
.th.w120{width:120px}.th.w140{width:140px}.th.w100{width:100px}.th.w160{width:160px}
.th-add{padding:8px 10px;cursor:pointer;color:var(--text3);font-size:12px;white-space:nowrap}
.th-add:hover{color:var(--red)}

.table-row{display:flex;align-items:center;border-bottom:1px solid var(--bdr);min-width:max-content;transition:background .2s var(--ease),transform .2s var(--ease);cursor:pointer}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:rgba(255,255,255,.025)}
.td{padding:10px 12px;border-right:1px solid var(--bdr);font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;display:flex;align-items:center;gap:6px}
.td:first-child{min-width:240px;flex:1;font-weight:500}
.td.w120{width:120px}.td.w140{width:140px}.td.w100{width:100px}.td.w160{width:160px}

.row-check{width:16px;height:16px;border:1.5px solid var(--bdr2);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--s-green)}
.row-check.checked{background:var(--s-green-bg);border-color:var(--s-green)}
.row-expand{width:16px;height:16px;color:var(--text3);cursor:pointer;flex-shrink:0}
.row-expand svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.row-comment{color:var(--text3);cursor:pointer;flex-shrink:0}
.row-comment svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.row-drag{color:var(--text4);cursor:grab;flex-shrink:0;font-size:14px}

.status-pill{font-size:10px;font-weight:600;padding:3px 10px;border-radius:9999px;cursor:pointer;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
.status-pill.faturando{background:rgba(16,185,129,.14);color:#10b981}
.status-pill.progresso{background:var(--s-orange-bg);color:var(--s-orange)}
.status-pill.atencao{background:rgba(192,40,45,.15);color:var(--red)}
.status-pill.planejamento{background:var(--s-blue-bg);color:var(--s-blue)}
.status-pill.parado{background:var(--s-gray-bg);color:var(--s-gray)}
.status-pill.qualificado{background:var(--s-purple-bg);color:var(--s-purple)}
.status-pill.perdido{background:rgba(192,40,45,.12);color:var(--red)}
.status-pill.novo{background:var(--s-blue-bg);color:var(--s-blue)}
.status-pill.tentativa{background:var(--s-yellow-bg);color:var(--s-yellow)}
.status-pill.ativo{background:rgba(16,185,129,.14);color:#10b981}
.status-pill.aguardando{background:var(--s-yellow-bg);color:var(--s-yellow)}
.status-pill.encerrado{background:var(--s-gray-bg);color:var(--s-gray)}
.status-pill.pago{background:rgba(16,185,129,.14);color:#10b981}
.status-pill.pendente{background:var(--s-gray-bg);color:var(--s-gray)}

.avatar-chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg4);border-radius:99px;padding:3px 8px 3px 3px;font-size:11px;color:var(--text2)}
.avatar{width:20px;height:20px;border-radius:50%;background:var(--red);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.add-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid var(--bdr);cursor:pointer;color:var(--text3);font-size:12px}
.add-row:hover{background:var(--bg3);color:var(--text)}
.add-row svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* ═══ KANBAN VIEW ═══ */
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;min-height:300px}
.kanban-wrap::-webkit-scrollbar{height:6px}
.kanban-wrap::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px}
.kanban-col{min-width:260px;width:260px;flex-shrink:0;background:var(--bg3);border-radius:var(--radius-lg);overflow:hidden}
.kanban-col-head{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid var(--bdr)}
.kanban-col-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.kanban-col-name{font-size:12px;font-weight:600;color:var(--text);flex:1}
.kanban-col-ct{font-size:11px;color:var(--text3);font-family:var(--mono)}
.kanban-cards{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:80px}
.kanban-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:13px 14px;cursor:pointer;transition:border-color .2s var(--ease),transform .2s var(--ease),box-shadow .2s var(--ease)}
.kanban-card:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.kc-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
.kc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kc-comment{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text3)}
.kc-comment svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:1.8}
.kanban-add{padding:8px;border-top:1px solid var(--bdr)}
.kanban-add-btn{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:7px;cursor:pointer;color:var(--text3);font-size:12px;transition:all .15s}
.kanban-add-btn:hover{background:var(--bg4);color:var(--text)}
.kanban-add-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.kanban-new-col{min-width:180px;width:180px;flex-shrink:0;background:var(--bg3);border-radius:var(--radius-lg);border:1px dashed var(--bdr2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:13px;transition:all .15s;gap:7px;padding:20px}
.kanban-new-col:hover{border-color:var(--red);color:var(--red)}
.kanban-new-col svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* ═══ CHARTS VIEW ═══ */
.charts-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.chart-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:18px 20px;transition:transform .2s var(--ease)}
.chart-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text)}
canvas{max-height:220px}
.legend-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ═══ CALENDAR VIEW ═══ */
/* ── CALENDAR ── */
.cal-wrap{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bdr)}
.cal-nav-btn{width:28px;height:28px;border:1px solid var(--bdr2);background:var(--bg3);border-radius:7px;color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--red);color:var(--red)}
.cal-title{font-size:14px;font-weight:600}
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed}
.cal-table thead th{text-align:center;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:10px 0 8px;border-bottom:1px solid var(--bdr)}
.cal-table tbody td{text-align:center;padding:0;height:40px;cursor:pointer;transition:background .12s;position:relative}
.cal-table tbody td.empty{cursor:default}
.cal-table tbody td .cal-num{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-size:13px;font-weight:400;color:var(--text);transition:background .12s,color .12s}
.cal-table tbody td:hover:not(.empty) .cal-num{background:var(--bg4)}
.cal-table tbody td.cal-today .cal-num{background:var(--red);color:white;font-weight:600}
.cal-table tbody td.cal-selected .cal-num{background:var(--red);color:white;font-weight:600}
.cal-table tbody td.cal-has-task .cal-num::after{content:"";position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--s-yellow);border-radius:50%}
.cal-table tbody td .cal-num{position:relative}
/* keep old classes for backward compat */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.cal-dow{text-align:center;font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);padding:10px 0 8px;text-transform:uppercase}
.cal-day{height:36px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;position:relative;transition:background .12s;border-radius:6px;margin:2px}
.cal-day.empty{cursor:default}
.cal-day.today .cal-num,.cal-day.selected .cal-num{background:var(--red);color:white;font-weight:600}
.cal-day.has-task::after{content:"";position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--s-yellow);border-radius:50%}
.cal-day:not(.empty):not(.selected):not(.today):hover{background:rgba(255,255,255,.04)}

/* ═══ ADD BAR ═══ */
.add-bar{display:flex;gap:7px;margin-bottom:10px}
.add-inp{flex:1;background:var(--surface);border:1px solid var(--bdr2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s}
.add-inp:focus{border-color:var(--red)}
.add-inp::placeholder{color:var(--text3)}
select.add-inp{cursor:pointer}
.add-btn{background:var(--red);color:white;border:none;border-radius:var(--radius-sm);width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.add-btn:active{background:var(--red-h)}

/* ═══ TASK ITEMS ═══ */
.task-item{display:flex;align-items:flex-start;gap:9px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.task-item:last-child{border-bottom:none}
.task-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;cursor:pointer;transition:all .12s;margin-top:1px}
.task-cb.done{background:var(--s-green-bg);border-color:var(--s-green);color:var(--s-green)}
.task-body{flex:1;min-width:0}
.task-text{font-size:13px;line-height:1.4}.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500;margin-top:3px}
.task-tag.dir{background:var(--s-blue-bg);color:var(--s-blue)}
.task-tag.traf{background:var(--red-s);color:var(--red)}
.task-tag.pes{background:var(--s-yellow-bg);color:var(--s-yellow)}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 4px}

/* ═══ MODALS ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s var(--ease)}

@media(min-width:640px){.overlay{align-items:center}}
.modal{background:rgba(30,30,34,.98);border:1px solid var(--bdr2);border-radius:18px 18px 0 0;width:100%;max-width:520px;transform:translateY(40px);transition:transform .3s var(--ease);max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,0)}
@media(min-width:640px){.modal{border-radius:16px;transform:scale(.97) translateY(8px)}}
.overlay.open .modal{transform:translateY(0) scale(1)}
.modal-drag{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:12px auto 0}
.modal-inner{padding:16px 18px 22px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.mfield{margin-bottom:11px}
.mfield label{font-size:10px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;display:block;margin-bottom:5px;font-weight:600}
.minput{width:100%;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 11px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.minput:focus{border-color:var(--red)}
.minput::placeholder{color:var(--text3)}

.mrow{display:flex;gap:8px}.mrow .mfield{flex:1}
.mbtn-row{display:flex;gap:8px;margin-top:14px}
.mbtn{flex:1;padding:11px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.mbtn.primary{background:var(--red);color:white}
.mbtn.primary:active{background:var(--red-h)}
.mbtn.secondary{background:var(--bg4);color:var(--text2)}
.mbtn.danger{background:rgba(192,40,45,.15);color:var(--red)}

/* Pay history */
.pay-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.pay-row:last-child{border-bottom:none}
.pay-row .pay-lbl{font-size:13px;flex:1}
.pay-row .pay-vfield{width:90px}

.pay-toggle{width:30px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.pay-toggle.on{background:var(--s-green)}.pay-toggle.off{background:var(--bg5)}
.pay-toggle::after{content:'';position:absolute;top:3px;width:12px;height:12px;border-radius:50%;background:white;transition:left .2s}
.pay-toggle.on::after{left:15px}.pay-toggle.off::after{left:3px}

/* Checklist */
.check-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.check-item:last-child{border-bottom:none}
.check-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:10px;transition:all .12s}
.check-cb.done{background:var(--s-green-bg);border-color:var(--s-green);color:var(--s-green)}
.check-label{flex:1;font-size:13px}.check-label.done{text-decoration:line-through;color:var(--text3)}
.check-cat{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:500}
.check-cat.urgente{background:var(--red-s);color:var(--red)}
.check-cat.normal{background:var(--bg4);color:var(--text2)}
.check-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}
.prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px}

/* Log panel */
.log-panel{position:fixed;top:0;right:0;width:min(300px,85vw);height:100vh;background:var(--bg2);border-left:1px solid var(--bdr);z-index:150;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:16px}
.log-panel.open{transform:translateX(0)}
.log-panel::-webkit-scrollbar{width:0}
.log-entry{padding:8px 0;border-bottom:1px solid var(--bdr)}
.log-entry:last-child{border-bottom:none}
.log-msg{font-size:12px;color:var(--text);line-height:1.4}
.log-ts{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}

/* Status dropdown */
.status-drop{position:absolute;background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:300;min-width:160px;padding:5px;overflow:hidden}
.status-opt{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s}
.status-opt:hover{background:var(--bg4)}

/* Empty states */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:8px}

/* Mobile bottom nav (shown on small screens) */
@media(max-width:640px){#sidebar{position:fixed;left:-240px;transition:left .25s;z-index:100;width:240px!important}#sidebar.mob-open{left:0}#sidebar.mob-open .board-item span,#sidebar.mob-open .sidebar-section-title,#sidebar.mob-open #sidebar-footer-text{display:block!important}#mob-nav{display:flex}#app{flex-direction:column}#main{padding-bottom:64px}}

.mob-nav-btn.active{color:var(--red)}
.mob-nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.cli-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);margin-bottom:7px;cursor:pointer;transition:background .2s var(--ease),border-color .2s var(--ease),transform .2s var(--ease)}.cli-item:hover{background:rgba(255,255,255,.035);border-color:var(--bdr2);transform:translateX(2px)}.cli-item.inactive{opacity:.5}.pending-cli-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .2s var(--ease);}.pending-cli-row:hover{background:rgba(255,255,255,.025)}

/* ── DESPESAS ── */
.desp-cat-header{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--bdr);cursor:pointer}
.desp-cat-name{font-size:12px;font-weight:600;color:var(--text)}
.desp-cat-total{font-family:var(--mono);font-size:12px;color:var(--red)}
.desp-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--bdr);transition:background .15s}
.desp-row:last-child{border-bottom:none}
.desp-row:hover{background:rgba(255,255,255,.025)}
.desp-name{flex:1;font-size:13px;color:var(--text)}
.desp-value{font-family:var(--mono);font-size:13px;color:var(--red);width:110px;text-align:right}
.desp-type{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;
  letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.desp-type.fixo{background:rgba(59,130,246,.12);color:#3b82f6}
.desp-type.variavel{background:rgba(245,158,11,.12);color:#f59e0b}
.desp-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;flex-shrink:0}
.lucro-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);
  padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:16px}
.lucro-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px}
.lucro-val{font-family:var(--mono);font-size:22px;font-weight:500}
/* ── ALERTS ── */
.alert-card{background:var(--surface);border:1px solid rgba(192,40,45,.35);
  border-radius:var(--radius);padding:11px 14px;margin-bottom:7px;
  display:flex;align-items:center;gap:10px}
.alert-card.warn{border-color:rgba(245,158,11,.4)}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-dot.urgent{background:var(--red);box-shadow:0 0 6px var(--red)}
.alert-dot.warn{background:var(--s-yellow)}
.alert-text{flex:1;font-size:13px;color:var(--text)}
.alert-date{font-size:10px;font-family:var(--mono);color:var(--text3);flex-shrink:0}
/* ── MEU DIA ── */
.md-section{margin-bottom:24px}
.md-section-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.md-section-title::after{content:"";flex:1;height:1px;background:var(--bdr)}
.mit-card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:border-color .2s,transform .2s}
.mit-card.done-card{opacity:.5}
.mit-card:hover{border-color:var(--bdr2);transform:translateX(2px)}
.mit-num{width:28px;height:28px;border-radius:8px;background:var(--red-s);border:1px solid rgba(192,40,45,.3);color:var(--red);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mit-num.done-num{background:var(--emerald-dim);border-color:rgba(16,185,129,.3);color:var(--emerald)}
.mit-text{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.mit-text.done-text{text-decoration:line-through;color:var(--text3)}
.mit-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.mit-cb{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;transition:all .15s}
.mit-cb.done{background:var(--emerald-dim);border-color:var(--emerald);color:var(--emerald)}

.pomo-wrap{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:20px;text-align:center;position:relative;overflow:hidden}
.pomo-ring{width:140px;height:140px;margin:0 auto 14px}
.pomo-ring svg{width:140px;height:140px;transform:rotate(-90deg)}
.pomo-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.pomo-ring .track{stroke:rgba(255,255,255,.06)}
.pomo-ring .fill{stroke:var(--red);transition:stroke-dashoffset .5s linear}
.pomo-ring.break .fill{stroke:var(--emerald)}
.pomo-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-22px);font-family:var(--mono);font-size:26px;font-weight:500;color:var(--text)}
.pomo-label{position:absolute;top:50%;left:50%;transform:translate(-50%,12px);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.pomo-task{font-size:13px;color:var(--text2);margin-bottom:14px;min-height:20px}
.pomo-btns{display:flex;gap:8px;justify-content:center}
.pomo-btn{padding:8px 20px;border:1px solid var(--bdr2);background:var(--bg3);color:var(--text);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.pomo-btn.primary{background:var(--red);border-color:var(--red);color:white}
.pomo-btn:hover{border-color:var(--bdr3)}
.pomo-count{display:flex;gap:5px;justify-content:center;margin-top:12px}
.pomo-dot{width:8px;height:8px;border-radius:50%;background:var(--bg4);transition:background .3s}
.pomo-dot.done{background:var(--red)}
/* Sequential task */
.seq-card{background:var(--surface);border:1px solid var(--red);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:6px;position:relative}
.seq-card.pending{background:var(--bg3);border-color:var(--bdr);opacity:.45}
.seq-card.done-seq{border-color:var(--emerald);opacity:.5;background:var(--emerald-dim)}
.seq-num{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:4px}
.seq-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.seq-sub{font-size:12px;color:var(--text3)}
/* Progress bar day */
.day-prog-wrap{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:14px 18px}
.day-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.day-prog-row:last-child{margin-bottom:0}
.day-prog-label{font-size:11px;color:var(--text2);width:80px;flex-shrink:0}
.day-prog-bar{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:9999px;overflow:hidden}
.day-prog-fill{height:100%;border-radius:9999px;transition:width .4s}
.day-prog-val{font-size:11px;font-family:var(--mono);color:var(--text3);width:40px;text-align:right;flex-shrink:0}
/* Review */
.review-q{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.review-q label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:6px}
.review-q textarea{width:100%;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none;resize:none;transition:border-color .15s}
.review-q textarea:focus{border-color:var(--red)}
/* Cal tasks */
.cal-task-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-sm);margin-bottom:6px}
.cal-task-tag{width:3px;height:20px;border-radius:99px;flex-shrink:0}
.cal-task-tag.traf{background:var(--red)}
.cal-task-tag.dir{background:var(--s-blue)}
.cal-task-tag.pes{background:var(--s-yellow)}
.cal-task-text{flex:1;font-size:13px;color:var(--text)}
.cal-task-done{text-decoration:line-through;color:var(--text3)}.sec-label-premium{font-size:10px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--text3);margin:20px 0 10px;display:flex;align-items:center;gap:8px}.sec-label-premium::after{content:"";flex:1;height:1px;background:var(--bdr)}
</style>

<div id="app">

<div id="sidebar">

function loadData(){
  try{
    const r=localStorage.getItem(SK);
    if(r){
      const parsed=JSON.parse(r);
      const allCore=['fin','cli','adv','leads','agenda','meudia','despesas','pagamentos','links'];
      if(parsed.boards){
        // Remove empty non-core boards
        parsed.boards=parsed.boards.filter(b=>allCore.includes(b.id)||(b.items&&b.items.length>0));
        // Inject any missing core boards WITHOUT clearing data
        const allCoreBoards=['fin','cli','adv','leads','pagamentos','links','despesas','meudia','agenda'];
        allCoreBoards.forEach(function(cid){
          if(!parsed.boards.find(function(b){return b.id===cid;})){
            const def=BOARDS_DEFAULT.find(function(b){return b.id===cid;});
            if(def)parsed.boards.push(JSON.parse(JSON.stringify(def)));
          }
        });
        // Fix adv type if old
        const advB=parsed.boards.find(function(b){return b.id==='adv';});
        if(advB&&advB.type==='processes')advB.type='advocacia';
      }
      return parsed;
    }
  }catch(e){console.warn('loadData error:',e);}
  return{boards:JSON.parse(JSON.stringify(BOARDS_DEFAULT)),log:[]};
}

  document.querySelectorAll('.view-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  renderContent();
}

  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));

function saveNewBoard(){
  const name=document.getElementById('nb-name').value.trim();if(!name)return;
  const icon=document.getElementById('nb-icon').value;
  const id='b'+uid();
  D.boards.push({id,name,icon,type:'custom',groups:[{id:'g-def',name:'Principal',collapsed:false}],columns:[{id:'col-s',name:'Status',type:'status',width:'w120'}],items:[]});

function setView(v,tab){
  curView=v;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  renderContent();
}

// ══════════════════════════════════════════════
//  RENDER CONTENT
// ══════════════════════════════════════════════
function renderContent(){
  const b=board();
  const el=document.getElementById('content');
  // destroy old charts
  Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});
  chartInstances={};

  if(b.type==='dashboard'){el.innerHTML='';renderDashboard(el);return}
  if(b.type==='meudia'){
    if(curView==='tabela'||!curView){el.innerHTML='';renderMeuDia(el);return}
    if(curView==='kanban'){renderKanbanView(el);return}
    if(curView==='graficos'){renderChartView(el);return}
  }
  if(b.type==='despesas'){el.innerHTML='';renderDespesas(el);return}
  if(b.type==='pagamentos'){el.innerHTML='';renderPagamentos(el);return}
  if(b.type==='links'){el.innerHTML='';renderLinks(el);return}
  if(b.type==='calendar'){el.innerHTML='';renderCalendarBoard(el);return}

  if(curView==='tabela') renderTableView(el);
  else if(curView==='kanban') renderKanbanView(el);
  else renderChartView(el);
}

function renderDashboard(el){
  const mk=curKey();
  const[yr,mo]=mk.split('-');
  const trafBoard=D.boards.find(b=>b.id==='cli');
  const advBoard=D.boards.find(b=>b.id==='adv');
  const trafAtivos=(trafBoard?.items||[]).filter(c=>c.group==='g-ativo');
  const advAtivos=(advBoard?.items||[]).filter(c=>c.status!=='encerrado');

  let tPaid=0,tPaidN=0,tPend=0;
  trafAtivos.forEach(c=>{const p=(c.payments||[]).find(x=>x.month===mk);if(p&&p.paid){tPaid+=p.value||c.value;tPaidN++;}else tPend+=c.value||0;});
  // Advocacia: soma total histórico (não mensal, pois honorários são pontuais)
  let aPaid=0,aPaidN=0,aPend=0;
  advAtivos.forEach(c=>{
    const totalPago=(c.payments||[]).filter(p=>p.paid).reduce((s,p)=>s+(p.value||0),0);
    if(totalPago>0){aPaid+=totalPago;aPaidN++;}
    else aPend+=c.value||0;
  });

  let hist=0;
  D.boards.forEach(b=>(b.items||[]).forEach(c=>(c.payments||[]).forEach(p=>{if(p.paid)hist+=p.value||c.value||0;})));
  const total=tPaid+aPaid;
  const contratado=trafAtivos.reduce((s,c)=>s+(c.value||0),0);
  const tPct=trafAtivos.length?Math.round(tPaidN/trafAtivos.length*100):0;
  const aPct=advAtivos.length?Math.round(aPaidN/advAtivos.length*100):0;

  el.innerHTML=`
  <div class="dash-grid">
    <div class="dash-card accent" style="grid-column:span 2">
      <div class="dc-label">Receita do mês</div>
      <div class="dc-val red">${fmtMoney(total)}</div>
      <div class="dc-sub">Tráfego + Advocacia</div>
      <div class="dc-corner">${MONTHS_S[parseInt(mo)-1]}/${yr}</div>
    </div>
    <div class="dash-card green">
      <div class="dc-label">Total histórico recebido</div>
      <div class="dc-val green">${fmtMoney(hist)}</div>
      <div class="dc-sub">todos os tempos</div>
    </div>
    <div class="dash-card">
      <div class="dc-label">Contratado ativo/mês</div>
      <div class="dc-val">${fmtMoney(contratado)}</div>
      <div class="dc-sub">clientes ativos</div>
    </div>
  </div>
  <div class="dash-grid">
    <div class="dash-card" style="border-color:rgba(192,40,45,.25)">
      <div class="dc-label">Despesas do mês</div>
      <div class="dc-val" style="color:var(--red)">${fmtMoney((()=>{try{var d=JSON.parse(localStorage.getItem('tm_despesas_v1')||'{"items":[]}');return (d.items||[]).reduce((s,x)=>s+(parseFloat(x.value)||0),0);}catch(e){return 0;}})())}</div>
      <div class="dc-sub">fixas + variáveis</div>
    </div>
    <div class="dash-card" style="border-color:rgba(16,185,129,.25)">
      <div class="dc-label">Lucro estimado</div>
      <div class="dc-val" style="color:var(--emerald)">${fmtMoney((()=>{try{var d=JSON.parse(localStorage.getItem('tm_despesas_v1')||'{"items":[]}');var desp=(d.items||[]).reduce((s,x)=>s+(parseFloat(x.value)||0),0);return (tPaid+aPaid)-desp;}catch(e){return tPaid+aPaid;}})())}</div>
      <div class="dc-sub">receita − despesas</div>
    </div>
  </div>
  <div class="dash-grid">
    <div class="dash-card">
      <div class="dc-label">Tráfego Pago</div>
      <div class="dc-val green">${fmtMoney(tPaid)}</div>
      <div class="dc-sub">${tPaidN} de ${trafAtivos.length} pagos</div>
      <div class="prog-track"><div class="prog-fill" style="width:${tPct}%;background:var(--s-green)"></div></div>
      <div class="prog-label"><span>0%</span><span>${tPct}%</span></div>
    </div>
    <div class="dash-card">
      <div class="dc-label">Advocacia</div>
      <div class="dc-val blue">${fmtMoney(aPaid)}</div>
      <div class="dc-sub">${aPaidN} cliente(s) com honorários</div>
      <div class="prog-track"><div class="prog-fill" style="width:${aPct}%;background:var(--s-blue)"></div></div>
      <div class="prog-label"><span>0%</span><span>${aPct}%</span></div>
    </div>
    <div class="dash-card">
      <div class="dc-label">Pendente tráfego</div>
      <div class="dc-val red">${fmtMoney(tPend)}</div>
    </div>
    <div class="dash-card">
      <div class="dc-label">Pendente advocacia</div>
      <div class="dc-val yellow">${fmtMoney(aPend)}</div>
    </div>
  </div>
  <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin:16px 0 10px;display:flex;align-items:center;gap:8px">Clientes pendentes este mês<span style="flex:1;height:1px;background:var(--bdr);display:block"></span></div>
  <div style="background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden">
    ${trafAtivos.filter(c=>{const p=(c.payments||[]).find(x=>x.month===mk);return!(p&&p.paid);}).map(c=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer" onclick="switchBoard('cli')">

        <div style="font-family:var(--mono);font-size:12px;color:var(--text2)">${fmtMoney(c.value)}</div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div style="background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:14px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px">Tráfego vs Advocacia</div>
      <canvas id="dash-chart-bar" style="max-height:160px"></canvas>
    </div>
    <div style="background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:14px">
      <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px">Clientes por status</div>
      <canvas id="dash-chart-pie" style="max-height:120px"></canvas>
      <div class="legend-list" id="dash-pie-legend" style="margin-top:8px"></div>
    </div>
  </div>
  <div style="background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:14px;margin-bottom:20px">
    <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px">Receita total mensal</div>
    <canvas id="dash-chart-line" style="max-height:140px"></canvas>
  </div>`;
  setTimeout(()=>{
    const now2=new Date();
    const last6=Array.from({length:6},(_,i)=>{const d=new Date(now2.getFullYear(),now2.getMonth()-5+i,1);return mkKey(d.getFullYear(),d.getMonth()+1);});
    const tB=D.boards.find(b=>b.id==='cli');
    const aB=D.boards.find(b=>b.id==='adv');
    const tItems=(tB?.items||[]).filter(c=>c.group==='g-ativo');
    const aItems=(aB?.items||[]);
    const tByM=last6.map(m=>tItems.reduce((s,c)=>{const p=(c.payments||[]).find(x=>x.month===m);return s+(p&&p.paid?(p.value||c.value||0):0);},0));
    const aByM=last6.map(m=>aItems.reduce((s,c)=>{const p=(c.payments||[]).find(x=>x.month===m);return s+(p&&p.paid?(p.value||c.value||0):0);},0));
    const lbs=last6.map(m=>{const[y,mo]=m.split('-');return MONTHS_S[parseInt(mo)-1]+'/'+y.slice(2);});
    const c1=document.getElementById('dash-chart-bar')?.getContext('2d');
    if(c1)chartInstances['db']=new Chart(c1,{type:'bar',data:{labels:lbs,datasets:[{label:'Tráfego',data:tByM,backgroundColor:'rgba(192,40,45,.8)',borderRadius:4},{label:'Advocacia',data:aByM,backgroundColor:'rgba(59,130,246,.7)',borderRadius:4}]},options:{plugins:{legend:{labels:{color:'#aeaeb2',font:{size:10}}}},scales:{x:{grid:{color:'rgba(255,255,255,.03)',drawBorder:false},ticks:{color:'#6c6c70',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.03)',drawBorder:false},ticks:{color:'#6c6c70',font:{size:10},callback:v=>'R$'+v}}}}});
    const totByM=last6.map((_,i)=>tByM[i]+aByM[i]);
    const c3=document.getElementById('dash-chart-line')?.getContext('2d');
    if(c3)chartInstances['dl']=new Chart(c3,{type:'line',data:{labels:lbs,datasets:[{label:'Total',data:totByM,borderColor:'#c0282d',backgroundColor:'rgba(192,40,45,.12)',tension:.4,fill:true,pointBackgroundColor:'#c0282d',pointRadius:4}]},options:{plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.03)',drawBorder:false},ticks:{color:'#6c6c70',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.03)',drawBorder:false},ticks:{color:'#6c6c70',font:{size:10},callback:v=>'R$'+v}}}}});
    const allC=(tB?.items||[]);
    const sMap={};allC.forEach(c=>{const s=c.status||'outro';sMap[s]=(sMap[s]||0)+1;});

    if(c2)chartInstances['dp']=new Chart(c2,{type:'doughnut',data:{labels:pL,datasets:[{data:pD,backgroundColor:pC,borderWidth:2,borderColor:'#28282c'}]},options:{plugins:{legend:{display:false}},cutout:'60%'}});

function renderTableView(el){
  const b=board();
  const cols=b.columns||[];
  const searchVal=(document.getElementById('search-inp')?.value||'').toLowerCase();

  let html='';
  (b.groups||[]).forEach(g=>{
    const items=(b.items||[]).filter(it=>it.group===g.id&&(!searchVal||it.name.toLowerCase().includes(searchVal)));
    html+=`<div class="board-table-wrap" style="margin-bottom:12px">
      <div class="group-header" onclick="toggleGroup('${g.id}')">
        <svg class="group-chevron${g.collapsed?'':' open'}" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="group-name">${escH(g.name)}</span>
        <span class="group-count">${items.length} itens</span>
        <span class="group-add-btn" onclick="event.stopPropagation();quickAddItem('${g.id}')">+ Adicionar item</span>
      </div>`;
    if(!g.collapsed){
      html+=`<div style="overflow-x:auto"><div style="min-width:max-content">
        <div class="table-head">
          <div class="th" style="min-width:240px;flex:1">ELEMENTO</div>
          ${cols.map(c=>`<div class="th ${c.width}">${escH(c.name)}</div>`).join('')}
          <div class="th-add" onclick="openAddColumn()">+ Coluna</div>
        </div>
        ${items.map(it=>renderTableRow(it,cols,b)).join('')}
        <div class="add-row" onclick="quickAddItem('${g.id}')">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar elemento
        </div>
      </div></div>`;
    }
    html+='</div>';
  });

  if(!(b.groups||[]).length)html='<div class="empty"><div class="empty-icon">📋</div>Nenhum grupo. Clique em + para criar.</div>';
  el.innerHTML=html;
}

function renderTableRow(it,cols,b){
  const comLen=(it.comments||[]).length;
  return `<div class="table-row" id="row_${it.id}" onclick="openItem('${it.id}')">
    <div class="td" style="min-width:240px;flex:1">
      <span class="row-drag">⠿</span>
      <span class="row-check${it._checked?' checked':''}" onclick="event.stopPropagation();toggleCheck2('${it.id}')">${it._checked?'✓':''}</span>
      <span class="row-expand" onclick="event.stopPropagation();openItem('${it.id}')"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>
      <div style="flex:1;min-width:0"><div>${escH(it.name)}</div>${it.notes?`<div style="font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px">${escH(it.notes)}</div>`:""}</div>
      ${comLen?`<span class="row-comment"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span style="font-size:10px;color:var(--text3)">${comLen}</span></span>`:''}
    </div>
    ${cols.map(c=>`<div class="td ${c.width}">${renderCellValue(it,c)}</div>`).join('')}
  </div>`;
}

function renderCellValue(it,col){
  if(col.type==='status'){
    const s=it.status||it[col.id]||'';
    return s?`<span class="status-pill ${s}" onclick="event.stopPropagation();openStatusDrop(event,'${it.id}','${col.id}')">${STATUS_LABELS[s]||s}</span>`:'<span style="color:var(--text3);font-size:12px">—</span>';
  }
  if(col.type==='money'){const v=it[col.id]??it.value??'';return v?`<span style="font-family:var(--mono);font-size:12px">${fmtMoney(v)}</span>`:'—'}
  if(col.type==='date'){const v=it[col.id]??it.since??it.prazo??'';return v?fmtDs(v):'—'}
  const v=it[col.id]??it[col.name.toLowerCase()]??'';
  return escH(String(v||'—'));
}

function toggleGroup(gid){
  const b=board();const g=b.groups.find(x=>x.id===gid);if(g)g.collapsed=!g.collapsed;save();renderContent();
}

function toggleCheck2(id){
  const b=board();const it=(b.items||[]).find(x=>x.id===id);if(!it)return;
  it._checked=!it._checked;save();renderContent();
}

function filterRows(v){renderContent()}

// ══════════════════════════════════════════════
//  CHART VIEW
// ══════════════════════════════════════════════
function renderChartView(el){
  const b=board();
  el.innerHTML=`<div class="charts-wrap">
    <div class="chart-card"><div class="chart-title">Distribuição por Status</div><canvas id="chart-status"></canvas><div class="legend-list" id="legend-status"></div></div>
    <div class="chart-card"><div class="chart-title">Itens por Grupo</div><canvas id="chart-group"></canvas></div>
  </div>`;

  // Status chart
  const statusCount={};
  (b.items||[]).forEach(it=>{const s=it.status||'outro';statusCount[s]=(statusCount[s]||0)+1;});
  const sLabels=Object.keys(statusCount).map(s=>STATUS_LABELS[s]||s);
  const sData=Object.values(statusCount);
  const sColors=Object.keys(statusCount).map(s=>STATUS_COLORS[s]||'#6c6c70');
  const ctx1=document.getElementById('chart-status')?.getContext('2d');
  if(ctx1){
    chartInstances['status']=new Chart(ctx1,{type:'doughnut',data:{labels:sLabels,datasets:[{data:sData,backgroundColor:sColors,borderWidth:2,borderColor:'#28282c'}]},options:{plugins:{legend:{display:false}},cutout:'65%'}});
    document.getElementById('legend-status').innerHTML=sLabels.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${sColors[i]}"></div>${l} (${sData[i]})</div>`).join('');
  }
  // Group chart
  const gLabels=(b.groups||[]).map(g=>g.name);
  const gData=(b.groups||[]).map(g=>(b.items||[]).filter(it=>it.group===g.id).length);
  const ctx2=document.getElementById('chart-group')?.getContext('2d');

//  ALERT HELPERS (used by Meu Dia)
// ══════════════════════════════════════════════
function getUpcomingAlerts(){
  var agendaB=D.boards.find(function(b){return b.id==='agenda';});
  if(!agendaB)return[];
  var today=new Date();today.setHours(0,0,0,0);
  var alerts=[];
  (agendaB.items||[]).forEach(function(t){
    if(t.done)return;
    var d=new Date(t.date+'T00:00:00');
    var diff=Math.ceil((d-today)/86400000);
    if(diff>=0&&diff<=7){
      alerts.push({id:t.id,text:t.text,date:t.date,diff:diff,tag:t.tag,
        urgent:diff<=2});
    }
  });
  alerts.sort(function(a,b){return a.diff-b.diff;});
  return alerts;
}

function addDesp(){
  var name=(document.getElementById('desp-name')||{value:''}).value.trim();
  if(!name){alert('Digite o nome da despesa');return;}
  var val=parseFloat((document.getElementById('desp-val')||{value:'0'}).value)||0;
  var cat=(document.getElementById('desp-cat')||{value:'Outros'}).value;
  var type=(document.getElementById('desp-type')||{value:'fixo'}).value;
  var parcelas=parseInt((document.getElementById('desp-parcelas')||{value:'1'}).value)||1;
  var desp=loadDesp();
  desp.items.push({id:uid(),name:name,cat:cat,value:val,type:type,parcelas:parcelas,parcelaAtual:1});
  saveDesp(desp);
  addLog('Despesa: '+name+' — '+fmtMoney(val)+(parcelas>1?' ('+parcelas+'x)':''));

function updDespName(id,val){
  var desp=loadDesp();

}
function updDesp(id,val){
  var desp=loadDesp();
  var it=desp.items.find(function(x){return x.id===id;});
  if(it){it.value=parseFloat(val)||0;saveDesp(desp);}
  renderContent();
}
function delDesp(id){
  var desp=loadDesp();
  var it=desp.items.find(function(x){return x.id===id;});

  desp.items=desp.items.filter(function(x){return x.id!==id;});
  saveDesp(desp);
  renderContent();
}

        var val=p?p.value:(c.value||0);

          +'<div onclick="togPayDirect(\''+c.id+'\',\''+mk+'\')" style="display:inline-flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 10px;border-radius:8px;transition:background .15s;background:'+(paid?'var(--emerald-dim)':'rgba(192,40,45,.08)')+';border:1px solid '+(paid?'rgba(16,185,129,.3)':'rgba(192,40,45,.2)')+'\">'
          +'<div style="font-family:var(--mono);font-size:13px;font-weight:500;color:'+(paid?'var(--emerald)':'var(--red)')+'">'+fmtMoney(val)+'</div>'
          +'<div style="font-size:9px;font-weight:600;letter-spacing:.05em;color:'+(paid?'var(--emerald)':'var(--text3)')+'">'+( paid?'✓ PAGO':'PENDENTE')+'</div>'
          +'</div>'
          +'</div>';
      });
      row+='</div>';
      s+=row;
    });
    // Totals row
    s+='<div style="display:grid;grid-template-columns:1fr 130px 130px;gap:0;padding:10px 14px;background:var(--bg3)">'
      +'<div style="font-size:11px;font-weight:700;color:var(--text2)">TOTAL</div>';
    months.forEach(function(mk){
      var paid=clients.reduce(function(sum,c){var p=(c.payments||[]).find(function(x){return x.month===mk&&x.paid;});return sum+(p?p.value:(0));},0);
      var total=clients.reduce(function(sum,c){return sum+(c.value||0);},0);
      s+='<div style="text-align:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--emerald)">'+fmtMoney(paid)+'<span style="color:var(--text3);font-weight:400"> / '+fmtMoney(total)+'</span></div>';
    });
    s+='</div></div></div>';
    return s;
  }

  out+=paySection('💼 Tráfego Pago',trafClients,'var(--red)');
  out+=paySection('⚖️ Advocacia',advClients,'var(--s-blue)');
  out+='<div style="height:40px"></div>';
  el.innerHTML=out;
}

// Toggle payment directly from pagamentos view
function togPayDirect(clientId,month){
  var found=false;
  D.boards.forEach(function(b){
    var c=(b.items||[]).find(function(x){return x.id===clientId;});
    if(!c)return;
    if(!c.payments)c.payments=[];
    var p=c.payments.find(function(x){return x.month===month;});
    if(p){
      p.paid=!p.paid;
      p.paidAt=p.paid?new Date().toISOString():null;
    } else {
      c.payments.push({month:month,value:c.value||0,paid:true,paidAt:new Date().toISOString()});
    }
    addLog((p&&p.paid?'Pago':'Revertido')+': '+c.name+' — '+month);
    found=true;
  });
  if(found){save();renderContent();}
}

var LINKS_KEY='tm_links_v1';
var LINK_CATS=['Tráfego','Advocacia','Ferramentas','Relatórios','Drive','Outros'];

function loadLinks(){
  try{var r=localStorage.getItem(LINKS_KEY);if(r)return JSON.parse(r);}catch(e){}
  return{items:[]};
}
function saveLinks(d){localStorage.setItem(LINKS_KEY,JSON.stringify(d));}

function renderLinks(el){
  var data=loadLinks();
  var items=data.items||[];
  var groups={};
  LINK_CATS.forEach(function(c){groups[c]=[];});
  items.forEach(function(it){
    var c=it.cat||'Outros';
    if(!groups[c])groups[c]=[];
    groups[c].push(it);
  });

  var out='';

  // Add link bar
  out+='<div class="board-table-wrap" style="margin-bottom:16px"><div style="padding:14px 16px">'
    +'<div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Adicionar link</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
    +'<input class="add-inp" id="link-new-name" placeholder="Nome do link..." style="flex:2;min-width:160px">'
    +'<input class="add-inp" id="link-new-url" placeholder="https://..." style="flex:3;min-width:200px">'
    +'<select class="add-inp" id="link-new-cat" style="flex:1;min-width:120px">';
  LINK_CATS.forEach(function(c){out+='<option value="'+c+'">'+c+'</option>';});

    +'<button class="add-btn" onclick="addLink2()">+</button>'
    +'</div></div></div>';

  // Search bar
  out+='<div style="margin-bottom:14px">'
    +'<input class="add-inp" id="link-search" placeholder="🔍 Buscar links..." style="width:100%;max-width:400px" oninput="renderContent()">'
    +'</div>';

  var search=(document.getElementById('link-search')||{value:''}).value.toLowerCase();

  // Categories
  var hasAny=false;
  LINK_CATS.forEach(function(cat){
    var catItems=(groups[cat]||[]).filter(function(it){
      return !search||it.name.toLowerCase().includes(search)||it.url.toLowerCase().includes(search);
    });
    if(!catItems.length)return;
    hasAny=true;
    var catColors={Tráfego:'var(--red)',Advocacia:'var(--s-blue)',Ferramentas:'var(--s-purple)',Relatórios:'var(--s-yellow)',Drive:'var(--emerald)',Outros:'var(--text3)'};
    out+='<div class="md-section"><div class="md-section-title" style="color:'+(catColors[cat]||'var(--text3)')+'">'+cat+' <span style="color:var(--text3);font-size:10px;font-weight:400">('+catItems.length+')</span></div>';
    out+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:4px">';
    catItems.forEach(function(it){
      out+='<div style="background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px;transition:border-color .2s,transform .2s" '
        +'onmouseover="this.style.borderColor=\'var(--bdr2)\';this.style.transform=\'translateY(-2px)\'" '
        +'onmouseout="this.style.borderColor=\'\';this.style.transform=\'\'">'
        +'<div style="width:32px;height:32px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">🔗</div>'
        +'<div style="flex:1;min-width:0">'
        +'<a href="'+escH(it.url)+'" target="_blank" style="font-size:13px;font-weight:500;color:var(--text);text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escH(it.url)+'">'+escH(it.name)+'</a>'
        +'<div style="font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px">'+escH(it.url)+'</div>'
        +'</div>'
        +'<button data-lid="'+it.id+'" onclick="delLink2(this.dataset.lid)" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;flex-shrink:0;padding:4px;border-radius:6px" title="Remover">&#215;</button>'
        +'</div>';
    });
    out+='</div></div>';
  });

  if(!hasAny&&items.length>0)out+='<div class="empty"><div class="empty-icon">🔍</div>Nenhum link encontrado</div>';
  if(!items.length)out+='<div class="empty"><div class="empty-icon">🔗</div>Nenhum link ainda.<br><span style="font-size:12px">Adicione links acima para começar.</span></div>';

  out+='<div style="height:40px"></div>';
  el.innerHTML=out;
  // Re-apply search
  var si=document.getElementById('link-search');
  if(si&&search)si.value=search;
}

function addLink2(){
  var name=(document.getElementById('link-new-name')||{value:''}).value.trim();
  var url=(document.getElementById('link-new-url')||{value:''}).value.trim();
  if(!name||!url){alert('Preencha nome e URL');return;}
  if(!url.startsWith('http'))url='https://'+url;
  var cat=(document.getElementById('link-new-cat')||{value:'Outros'}).value;
  var data=loadLinks();
  data.items.push({id:uid(),name:name,url:url,cat:cat,created:new Date().toISOString()});
  saveLinks(data);
  addLog('Link adicionado: '+name);
  renderContent();
}
function delLink2(id){
  var data=loadLinks();
  var it=data.items.find(function(x){return x.id===id;});
  if(it)addLog('Link removido: '+it.name);
  data.items=data.items.filter(function(x){return x.id!==id;});
  saveLinks(data);
  renderContent();
}


function renderCalendarBoard(el){
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var firstDay=new Date(calYear,calMonth,1).getDay();
  var todayStr=todayISO();
  var b=board();
  var DOW=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];

  var cells=[];
  for(var i=0;i<firstDay;i++)cells.push(0);
  for(var d=1;d<=daysInMonth;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(0);

  var thHTML='<tr>';
  for(var w=0;w<7;w++)thHTML+='<th>'+DOW[w]+'</th>';
  thHTML+='</tr>';

  var tbHTML='';
  for(var r=0;r<cells.length/7;r++){
    tbHTML+='<tr>';
    for(var c=0;c<7;c++){
      var day=cells[r*7+c];
      if(!day){tbHTML+='<td class="empty"></td>';continue;}
      var mo=String(calMonth+1).padStart(2,'0');
      var dy=String(day).padStart(2,'0');
      var iso=calYear+'-'+mo+'-'+dy;
      var cls='';
      if(iso===selDate)cls='cal-selected';
      else if(iso===todayStr)cls='cal-today';
      if((b.items||[]).some(function(t){return t.date===iso;}))cls+=' cal-has-task';
      tbHTML+='<td class="'+cls.trim()+'" data-iso="'+iso+'"><span class="cal-num">'+day+'</span></td>';
    }
    tbHTML+='</tr>';
  }

  var calHTML='<div class="cal-wrap">'
    +'<div class="cal-nav">'
    +'<button class="cal-nav-btn" id="cal-prev">&#8249;</button>'
    +'<div class="cal-title">'+MONTHS_PT[calMonth]+' '+calYear+'</div>'
    +'<button class="cal-nav-btn" id="cal-next">&#8250;</button>'
    +'</div>'
    +'<table class="cal-table" id="cal-table-main"><thead>'+thHTML+'</thead><tbody>'+tbHTML+'</tbody></table>'
    +'</div>';

  var selD=new Date(selDate+'T12:00:00');
  var dayLabel=DAYS_S[selD.getDay()]+', '+selD.getDate()+' de '+MONTHS_PT[selD.getMonth()];
  var dayTasks=(b.items||[]).filter(function(t){return t.date===selDate;});

  var taskHTML='<div style="font-size:13px;font-weight:600;margin-bottom:10px">'+escH(dayLabel)+'</div>'
    +'<div class="add-bar">'
    +'<input class="add-inp" id="new-task-inp" placeholder="Nova tarefa...">'
    +'<select class="add-inp" style="max-width:110px;font-size:12px" id="new-task-tag">'
    +'<option value="traf">Trafego</option>'
    +'<option value="dir">Direito</option>'
    +'<option value="pes">Pessoal</option>'
    +'</select>'
    +'<select class="add-inp" id="new-task-urgency" style="max-width:100px;font-size:12px">'
    +'<option value="0">Normal</option>'
    +'<option value="1">&#128680; Prazo</option>'
    +'</select>'
    +'<button class="add-btn" id="cal-add-btn">+</button>'
    +'</div>';

  if(dayTasks.length){
    taskHTML+='<div style="background:var(--surface);border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:2px 14px">';
    for(var ti=0;ti<dayTasks.length;ti++){
      var t=dayTasks[ti];
      var tagLabel=t.tag==='traf'?'Trafego':t.tag==='dir'?'Direito':'Pessoal';
      taskHTML+='<div class="task-item">'
        +'<div class="task-cb'+(t.done?' done':'')+'" data-taskid="'+t.id+'" data-action="toggle">'+(t.done?'&#10003;':'')+'</div>'
        +'<div class="task-body">'
        +'<div class="task-text'+(t.done?' done':'')+'">'+escH(t.text||'')+'</div>'
        +'<span class="task-tag '+t.tag+'">'+tagLabel+'</span>'
        +'</div>'
        +'<button class="task-del" data-taskid="'+t.id+'" data-action="delete">&#215;</button>'
        +'</div>';
    }
    taskHTML+='</div>';
  } else {
    taskHTML+='<div class="empty" style="padding:20px"><div class="empty-icon">&#10003;</div>Nenhuma tarefa neste dia</div>';
  }

  el.innerHTML=calHTML+taskHTML;

  // Attach events after render (no inline onclick needed)
  var calTable=document.getElementById('cal-table-main');
  if(calTable)calTable.addEventListener('click',function(e){
    var td=e.target.closest('td[data-iso]');
    if(td)selDay(td.getAttribute('data-iso'));
  });
  var prevBtn=document.getElementById('cal-prev');
  if(prevBtn)prevBtn.onclick=function(){calShift(-1);};
  var nextBtn=document.getElementById('cal-next');
  if(nextBtn)nextBtn.onclick=function(){calShift(1);};
  var addBtn=document.getElementById('cal-add-btn');
  if(addBtn)addBtn.onclick=addCalTask;
  el.addEventListener('click',function(e){
    var cb=e.target.closest('[data-action="toggle"]');
    if(cb)toggleCalTask(cb.getAttribute('data-taskid'));
    var del=e.target.closest('[data-action="delete"]');
    if(del)delCalTask(del.getAttribute('data-taskid'));
    var edt=e.target.closest('[data-action="edit"]');
    if(edt)editCalTask(edt.getAttribute('data-taskid'));
  });
}

function calShift(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderContent();}
function selDay(iso){selDate=iso;renderContent();}
function addCalTask(){
  const b=board();const text=document.getElementById('new-task-inp')?.value.trim();if(!text)return;
  const tag=document.getElementById('new-task-tag')?.value||'traf';
  if(!b.items)b.items=[];
  b.items.push({id:uid(),text,tag,done:false,date:selDate});
  addLog('Tarefa: '+text+' ('+selDate+')');renderContent();
}

  var agendaB=D.boards.find(function(b){return b.id==='agenda';});if(!agendaB)return;

    +'<div class="mfield"><label>Categoria</label><select class="minput" id="ect-tag">'
    +'<option value="traf"'+(t.tag==='traf'?' selected':'')+'>Tráfego</option>'
    +'<option value="dir"'+(t.tag==='dir'?' selected':'')+'>Direito</option>'

    +'<div class="mfield"><label>Tipo</label><select class="minput" id="ect-urgency">'

    +'<option value="1"'+(t.prazo?' selected':'')+'>🚨 Prazo</option>'
    +'</select></div>'
    +'<div class="mfield"><label>Notas</label><textarea class="minput" id="ect-notes" rows="2">'+escH(t.notes||'')+'</textarea></div>'

    +'<button class="mbtn primary" onclick="saveCalTask(&quot;'+taskId+'&quot;)">Salvar</button>'

  openModal('modal-add');
}
function saveCalTask(id){
  var agendaB=D.boards.find(function(b){return b.id==='agenda';});if(!agendaB)return;
  var t=(agendaB.items||[]).find(function(x){return x.id===id;});if(!t)return;
  t.text=document.getElementById('ect-text').value.trim()||t.text;
  t.date=document.getElementById('ect-date').value||t.date;
  t.tag=document.getElementById('ect-tag').value;
  t.prazo=document.getElementById('ect-urgency').value==='1';
  t.notes=document.getElementById('ect-notes').value;
  addLog('Tarefa editada: '+t.text);
  save();closeModal('modal-add');renderContent();
}

  // removed - handled by editCalTask

function updItemField(id,field,val){
  D.boards.forEach(b=>{const it=(b.items||[]).find(x=>x.id===id);if(it){it[field]=val;addLog('Editado '+field+': '+it.name);}});

}
function delItem(id){

function togPay(clientId,month){
  D.boards.forEach(b=>{const c=(b.items||[]).find(x=>x.id===clientId);if(!c)return;if(!c.payments)c.payments=[];let p=c.payments.find(x=>x.month===month);if(!p){p={month,value:c.value,paid:false,paidAt:null};c.payments.push(p);}p.paid=!p.paid;p.paidAt=p.paid?nowISO():null;const[y,mo]=month.split('-');addLog(`${p.paid?'Pago':'Desmarcado'}: ${c.name} — ${MONTHS_S[parseInt(mo)-1]}/${y} — ${fmtMoney(p.value||c.value)}`);});

function updPayVal(cid,month,val){
  D.boards.forEach(b=>{const c=(b.items||[]).find(x=>x.id===cid);if(!c)return;if(!c.payments)c.payments=[];let p=c.payments.find(x=>x.month===month);if(!p){p={month,value:parseFloat(val)||0,paid:false,paidAt:null};c.payments.push(p);}else p.value=parseFloat(val)||0;});

}
function delPayMonth(clientId,month){
  D.boards.forEach(b=>{
    const c=(b.items||[]).find(x=>x.id===clientId);
    if(!c||!c.payments)return;
    const[y,mo]=month.split('-');
    const lbl=MONTHS_S[parseInt(mo)-1]+'/'+y;

    c.payments=c.payments.filter(x=>x.month!==month);

  const b=D.boards.find(b=>(b.items||[]).find(x=>x.id===clientId));

}

function addLink(itemId){
  const urlEl=document.getElementById('link-url-'+itemId);
  const lblEl=document.getElementById('link-label-'+itemId);
  const url=(urlEl?.value||'').trim();
  if(!url)return;
  const label=(lblEl?.value||'').trim();
  D.boards.forEach(b=>{
    const it=(b.items||[]).find(x=>x.id===itemId);
    if(!it)return;
    if(!it.links)it.links=[];
    it.links.push({url,label});
    addLog('Link adicionado: '+(label||url)+' em '+it.name);
  });
  if(urlEl)urlEl.value='';
  if(lblEl)lblEl.value='';
  save();
  const it=D.boards.flatMap(b=>b.items||[]).find(x=>x.id===itemId);
  const b=D.boards.find(b=>(b.items||[]).find(x=>x.id===itemId));
  if(it&&b)renderItemModal(it,b);
}
function delLink(itemId,idx){
  D.boards.forEach(b=>{
    const it=(b.items||[]).find(x=>x.id===itemId);
    if(!it||!it.links)return;
    const removed=it.links.splice(idx,1);
    addLog('Link removido: '+(removed[0]?.label||removed[0]?.url||'')+' de '+it.name);
  });
  save();
  const it=D.boards.flatMap(b=>b.items||[]).find(x=>x.id===itemId);
  const b=D.boards.find(b=>(b.items||[]).find(x=>x.id===itemId));
  if(it&&b)renderItemModal(it,b);
}

      {month:'2025-02',value:200,paid:true,paidAt:'2025-02-01T00:00:00.000Z'},
      {month:'2025-03',value:200,paid:true,paidAt:'2025-03-01T00:00:00.000Z'},
      {month:'2025-04',value:721,paid:true,paidAt:'2025-04-01T00:00:00.000Z'},
    ],
    'c12':[
      {month:'2025-01',value:3000,paid:true,paidAt:'2025-01-01T00:00:00.000Z'},
      {month:'2025-02',value:4000,paid:true,paidAt:'2025-02-01T00:00:00.000Z'},
    ],
  };
  (advBoard.items||[]).forEach(it=>{
    const pays=advPays[it.id];
    if(!pays)return;
    if(!it.payments)it.payments=[];
    pays.forEach(p=>{
      if(!it.payments.find(x=>x.month===p.month)){
        it.payments.push(p);
      }
    });
    // Set value on item too
    if(it.id==='c10')it.value=500;
    if(it.id==='c11')it.value=1621;
    if(it.id==='c12')it.value=7000;
  });
  save();
}
injectAdvPayments();

// Hard reset function - clears ALL localStorage
function hardReset(){
  localStorage.clear();
  location.reload();
}

// Auto-detect corrupted/empty state
(function(){
  try{
    const r=localStorage.getItem(SK);
    if(!r){return;} // no data = use defaults, fine
    const parsed=JSON.parse(r);
    const core=['fin','cli','adv','leads','agenda'];
    const hasCore=core.every(id=>(parsed.boards||[]).find(b=>b.id===id));
    if(!hasCore||!parsed.boards||parsed.boards.length===0){
      document.getElementById('reset-helper').style.display='block';
      document.getElementById('emergency-reset').style.display='flex';
      localStorage.clear();
      D={boards:JSON.parse(JSON.stringify(BOARDS_DEFAULT)),log:[]};
      save();
    }
  }catch(e){
    localStorage.clear();
    D={boards:JSON.parse(JSON.stringify(BOARDS_DEFAULT)),log:[]};
    save();
  }
})();

// ── BULLETPROOF INIT ─────────────────────────────────────
function initDashboard(){
  sidebarCollapsed=false;
  var sb=document.getElementById('sidebar');
  if(sb)sb.classList.remove('collapsed');

  // Step 1: render immediately from localStorage
  renderSidebar();

  if(D.boards.length===0){
    var rh=document.getElementById('reset-helper');
    if(rh)rh.style.display='block';
  } else {
    var rh2=document.getElementById('reset-helper');
    if(rh2)rh2.style.display='none';
    switchBoard('meudia');
  }

  // Step 2: sync Supabase in background after 200ms
  setTimeout(function(){
    sbLoad().catch(function(e){console.warn('sbLoad error:',e);});
  }, 200);

  setInterval(updateTopbar,60000);
}

// Run after DOM is fully ready
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', initDashboard);
} else {
  initDashboard();
}

</script>
